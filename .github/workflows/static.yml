name: Deploy Static Content to Pages

on:
  push:
    branches:
      - main
#      - develop
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Never cancel an in-progress run: cancelling mid-deploy leaves the
# github-pages environment holding a non-terminal deployment, which then
# blocks every subsequent run at "deployment_queued". Queue instead.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # deploy-pages has its own hard 10-min cap while it waits for GitHub Pages
    # to pick up the deployment; this is just an outer safety net.
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

#      - name: Checkout develop
#        uses: actions/checkout@v4
#        with:
#          ref: develop
#          path: develop

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Clean install dependencies (Main)
        run: |
          rm -rf main/node_modules
          pnpm install --no-frozen-lockfile
        working-directory: main

#      - name: Clean install dependencies (Develop)
#        run: |
#          rm -rf develop/node_modules
#          pnpm install --no-frozen-lockfile
#        working-directory: develop

      - name: Build construct game
        run: npm run build:construct-crazygames
        working-directory: main
        env:
          VITE_APP_TURN_USERNAME: ${{ secrets.VITE_APP_TURN_USERNAME }}

#      - name: Build Main Production
#        run: npm run build-github-main
#        working-directory: main
#        env:
#          VITE_APP_TURN_USERNAME: ${{ secrets.VITE_APP_TURN_USERNAME }}
#          VITE_APP_TURN_CREDENTIAL: ${{ secrets.VITE_APP_TURN_CREDENTIAL }}

#      - name: Build Develop Production
#        run: npm run build-github-develop
#        working-directory: develop
#        env:
#          VITE_APP_TURN_USERNAME: ${{ secrets.VITE_APP_TURN_USERNAME }}
#          VITE_APP_TURN_CREDENTIAL: ${{ secrets.VITE_APP_TURN_CREDENTIAL }}

      - name: Create Dist Folder
        run: mkdir dist

      - name: Copy Main Build
        run: cp -r main/.c3-build/dist/* dist/

#      - name: Copy Develop Build
#        run: cp -r develop/dist/* dist/develop/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4