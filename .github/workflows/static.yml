name: Deploy Static Content to Pages

on:
  push:
    branches:
      - main
#      - develop
  workflow_dispatch:

# Branch-based deploy: peaceiris pushes the built site to the `gh-pages`
# branch, so we need write access to repo contents (not the pages/id-token
# scopes the Actions deploy-pages flow required).
permissions:
  contents: write

# Don't cancel an in-progress publish; let concurrent pushes queue so the
# gh-pages branch is never updated by two runs at once.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          path: main

#      - name: Checkout develop
#        uses: actions/checkout@v4
#        with:
#          ref: develop
#          path: develop

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 10.6.2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Clean install dependencies (Main)
        run: |
          rm -rf main/node_modules
          pnpm install --no-frozen-lockfile
        working-directory: main

#      - name: Clean install dependencies (Develop)
#        run: |
#          rm -rf develop/node_modules
#          pnpm install --no-frozen-lockfile
#        working-directory: develop

      - name: Build construct game
        run: npm run build:construct-crazygames
        working-directory: main
        env:
          VITE_APP_TURN_USERNAME: ${{ secrets.VITE_APP_TURN_USERNAME }}

#      - name: Build Main Production
#        run: npm run build-github-main
#        working-directory: main
#        env:
#          VITE_APP_TURN_USERNAME: ${{ secrets.VITE_APP_TURN_USERNAME }}
#          VITE_APP_TURN_CREDENTIAL: ${{ secrets.VITE_APP_TURN_CREDENTIAL }}

#      - name: Build Develop Production
#        run: npm run build-github-develop
#        working-directory: develop
#        env:
#          VITE_APP_TURN_USERNAME: ${{ secrets.VITE_APP_TURN_USERNAME }}
#          VITE_APP_TURN_CREDENTIAL: ${{ secrets.VITE_APP_TURN_CREDENTIAL }}

      - name: Create Dist Folder
        run: mkdir dist

      - name: Copy Main Build
        run: cp -r main/.c3-build/dist/* dist/

#      - name: Copy Develop Build
#        run: cp -r develop/dist/* dist/develop/

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
          # peaceiris drops a .nojekyll file automatically, so GitHub Pages
          # serves the files as-is (no Jekyll processing).